{% extends 'portal_trabajo/base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Acceso a Tripulantes</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Ingresar al Portal</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
