<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 6 - Monitoreo SOC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">

    <div class="container mt-5">
        <h2>Panel de Control - Nodos de Red</h2>
        <hr class="bg-light">

        <button type="button" class="btn btn-info mb-4" data-toggle="tooltip" data-placement="right" title="Plugin Tooltip activado correctamente vía jQuery">
            Verificar Estado de Plugin
        </button>

        <div class="card text-dark mb-3 shadow-lg">
            <div class="card-body">
                <h5 class="card-title">Infraestructura Crítica</h5>
                
                <ul id="lista-nodos" class="list-group mb-4">
                    <li class="list-group-item">Servidor Web Perimetral (192.168.1.10)</li>
                    <li class="list-group-item">Base de Datos Central (192.168.1.20)</li>
                    <li class="list-group-item">Firewall de Aplicaciones - WAF (192.168.1.1)</li>
                </ul>

                <button id="btn-toggle" class="btn btn-danger">Ocultar lista</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    
    <script src="assets/js/script.js"></script>
</body>
</html>
