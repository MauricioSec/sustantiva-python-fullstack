<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de prueba de HTML5</title>
    <style>
    /* 1. Configuración General */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
    }

    h1 {
        color: #2c3e50;
        margin-bottom: 30px;
    }

    /* 2. Estructura del Formulario */
    form {
        background: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 500px;
    }

    /* 3. Alineación de Campos */
    p {
        display: grid;
        grid-template-columns: 160px 1fr; /* Alinea etiquetas a la izquierda */
        align-items: center;
        margin-bottom: 15px;
    }

    label {
        font-weight: 600;
        font-size: 0.9rem;
    }

    /* 4. Estilo de los Inputs */
    input {
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.9rem;
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    /* Efecto de enfoque (Focus) */
    input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
    }

    /* 5. Botón de Envío */
    button {
        grid-column: 1 / span 2; /* Ocupa todo el ancho */
        background-color: #2c3e50;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 10px;
    }

    button:hover {
        background-color: #34495e;
    }
</style>
</head>
<body>
    <h1>Formulario de prueba de HTML5</h1>
    
    <form action="" method="GET">
        
        <p>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required autofocus>
        </p>

        <p>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>
        </p>

        <p>
            <label for="url">URL:</label>
            <input type="url" id="url" name="url" placeholder="Escribe la URL de tu página web personal">
        </p>

        <p>
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" name="fecha">
        </p>

        <p>
            <label for="tiempo">Tiempo:</label>
            <input type="time" id="tiempo" name="tiempo">
        </p>

        <p>
            <label for="fecha-hora">Fecha y hora:</label>
            <input type="datetime-local" id="fecha-hora" name="fecha-hora">
        </p>

        <p>
            <label for="mes">Mes:</label>
            <input type="month" id="mes" name="mes">
        </p>

        <p>
            <label for="semana">Semana:</label>
            <input type="week" id="semana" name="semana">
        </p>

        <p>
            <label for="numero">Número (min -10, max 10):</label>
            <input type="number" id="numero" name="numero" min="-10" max="10">
        </p>

        <p>
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono">
        </p>

        <p>
            <label for="busqueda">Término de búsqueda:</label>
            <input type="search" id="busqueda" name="busqueda">
        </p>

        <p>
            <label for="color">Color favorito:</label>
            <input type="color" id="color" name="color">
        </p>

        <p>
            <button type="submit">Enviar</button>
        </p>

    </form>
</body>
</html>
