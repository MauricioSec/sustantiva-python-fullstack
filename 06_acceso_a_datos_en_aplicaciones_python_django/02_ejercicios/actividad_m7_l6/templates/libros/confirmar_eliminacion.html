{% extends 'base.html' %}

{% block content %}
    <h3 style="color: red;">⚠️ Confirmar Eliminación</h3>
    <p>¿Estás completamente seguro de que deseas eliminar el libro <strong>"{{ libro.titulo }}"</strong>?</p>
    
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="color: red;">Sí, eliminar permanentemente</button>
    </form>
    <br>
    <a href="{% url 'listar_libros' %}">Cancelar y Volver</a>
{% endblock %}
